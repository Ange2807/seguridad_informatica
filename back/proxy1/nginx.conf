server {
    # Único punto de entrada público del proyecto: HTTPS en el puerto 443.
    listen 443 ssl;
    server_name plataforma.empresa.local;

    # Certificado autofirmado generado por el entrypoint del contenedor.
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Todo lo que empiece por /api/ se reenvía a proxy2, que contiene la lógica del backend.
    location /api/ {
        proxy_pass http://proxy2:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # El resto de rutas sirve la web pública desde online-platform.
    location / {
        proxy_pass http://online-platform:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
